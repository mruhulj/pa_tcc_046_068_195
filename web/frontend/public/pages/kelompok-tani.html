<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelompok Tani — SiPupuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 flex">
  <div id="navbar"></div>
  <main class="flex-1 p-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Kelompok Tani</h1>
          <p class="text-gray-500 text-sm mt-1">Kelola data kelompok tani penerima pupuk subsidi</p>
        </div>
        <button onclick="openModal()"
          class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-5 py-2.5 rounded-xl flex items-center gap-2 transition">
          <i class="fas fa-plus"></i> Tambah Kelompok Tani
        </button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Nama Kelompok</th>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Ketua</th>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Wilayah</th>
                <th class="text-center px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Anggota</th>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Telepon</th>
                <th class="text-center px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Status</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
        <div id="tableEmpty" class="hidden py-12 text-center text-gray-400">
          <i class="fas fa-users text-3xl mb-3"></i>
          <p>Belum ada data kelompok tani</p>
        </div>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-gray-800 text-lg">Tambah Kelompok Tani</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Nama Kelompok</label>
          <input type="text" id="fNama" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Nama Ketua</label>
          <input type="text" id="fKetua" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Wilayah</label>
          <select id="fWilayah" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
            <option value="">Pilih Wilayah</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Jumlah Anggota</label>
            <input type="number" id="fAnggota" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Telepon</label>
            <input type="text" id="fTelepon" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Alamat</label>
          <textarea id="fAlamat" rows="2" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none resize-none"></textarea>
        </div>
        <button onclick="save()"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-xl transition text-sm">Simpan</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-4 right-4 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    requireAuth();
    document.getElementById('navbar').innerHTML = renderNavbar('kelompok');

    const loadData = async () => {
      const res = await api.getKelompokTani();
      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('tableEmpty');
      if (res.success && res.data.length) {
        empty.classList.add('hidden');
        tbody.innerHTML = res.data.map(k => `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 font-medium text-gray-800">${k.nama}</td>
            <td class="px-6 py-4 text-gray-600">${k.ketua_nama || '-'}</td>
            <td class="px-6 py-4 text-gray-600">${k.wilayah_nama || '-'}</td>
            <td class="px-6 py-4 text-center text-gray-600">${k.jumlah_anggota} orang</td>
            <td class="px-6 py-4 text-gray-600">${k.telepon || '-'}</td>
            <td class="px-6 py-4 text-center">
              <span class="px-2.5 py-1 rounded-full text-xs font-medium ${badgeStatus(k.status)}">${k.status}</span>
            </td>
          </tr>`).join('');
      } else { tbody.innerHTML = ''; empty.classList.remove('hidden'); }
    };

    const openModal = async () => {
      const res = await api.getWilayah();
      const sel = document.getElementById('fWilayah');
      sel.innerHTML = '<option value="">Pilih Wilayah</option>';
      if (res.success) res.data.forEach(w => { sel.innerHTML += `<option value="${w.id}">${w.nama}</option>`; });
      document.getElementById('modal').classList.remove('hidden');
    };
    const closeModal = () => document.getElementById('modal').classList.add('hidden');

    const save = async () => {
      const nama = document.getElementById('fNama').value.trim();
      const wilayah_id = document.getElementById('fWilayah').value;
      if (!nama || !wilayah_id) return showToast('Nama dan wilayah wajib diisi', 'error');
      const res = await api.createKelompokTani({
        nama,
        ketua_nama: document.getElementById('fKetua').value,
        wilayah_id,
        jumlah_anggota: parseInt(document.getElementById('fAnggota').value) || 0,
        telepon: document.getElementById('fTelepon').value,
        alamat: document.getElementById('fAlamat').value
      });
      if (res.success) { showToast(res.message); closeModal(); loadData(); }
      else showToast(res.message, 'error');
    };

    loadData();
  </script>
</body>
</html>
