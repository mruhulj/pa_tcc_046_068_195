<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SiPupuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-800 via-green-700 to-emerald-600 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-xl mb-4">
        <i class="fas fa-seedling text-4xl text-green-600"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">SiPupuk</h1>
      <p class="text-green-200 mt-1 text-sm">Sistem Distribusi Pupuk Subsidi</p>
    </div>

    <!-- Card Login -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Masuk ke Sistem</h2>

      <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-4"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="email" type="email" placeholder="email@dinas.go.id"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="password" type="password" placeholder="••••••••"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"/>
          </div>
        </div>

        <button id="btnLogin"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2">
          <i class="fas fa-sign-in-alt"></i>
          <span>Masuk</span>
        </button>
      </div>

      <p class="text-center text-xs text-gray-400 mt-6">
        Dinas Pertanian &amp; Ketahanan Pangan
      </p>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    // Redirect jika sudah login
    if (localStorage.getItem('token')) window.location.href = '/pages/dashboard.html';

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      const btn = document.getElementById('btnLogin');

      if (!email || !password) {
        errEl.textContent = 'Email dan password wajib diisi';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      try {
        const res = await auth.login(email, password);
        if (res.success) {
          localStorage.setItem('token', res.data.token);
          localStorage.setItem('user', JSON.stringify(res.data.user));
          window.location.href = '/pages/dashboard.html';
        } else {
          errEl.textContent = res.message || 'Login gagal';
          errEl.classList.remove('hidden');
        }
      } catch (e) {
        errEl.textContent = 'Gagal terhubung ke server';
        errEl.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Masuk</span>';
    });

    // Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
  </script>
</body>
</html>
