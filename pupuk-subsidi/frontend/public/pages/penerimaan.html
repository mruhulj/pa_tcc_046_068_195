<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Penerimaan — SiPupuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 flex">
  <div id="navbar"></div>
  <main class="flex-1 p-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Verifikasi Penerimaan</h1>
          <p class="text-gray-500 text-sm mt-1">Verifikasi laporan penerimaan pupuk dari kelompok tani</p>
        </div>
      </div>

      <!-- Filter -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-6 flex gap-4 flex-wrap">
        <select id="filterStatus" class="border border-gray-200 rounded-xl px-3 py-2 text-sm">
          <option value="">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="diverifikasi">Diverifikasi</option>
          <option value="ditolak">Ditolak</option>
        </select>
        <button onclick="loadPenerimaan()"
          class="bg-green-50 text-green-700 border border-green-200 px-4 py-2 rounded-xl text-sm font-medium hover:bg-green-100 transition">
          <i class="fas fa-search"></i> Filter
        </button>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Kelompok Tani</th>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Pupuk</th>
                <th class="text-right px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Dikirim (kg)</th>
                <th class="text-right px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Diterima (kg)</th>
                <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Tgl Terima</th>
                <th class="text-center px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Bukti</th>
                <th class="text-center px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                <th class="text-center px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
              </tr>
            </thead>
            <tbody id="penerimaanBody" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
        <div id="penerimaanEmpty" class="hidden py-12 text-center text-gray-400">
          <i class="fas fa-clipboard-check text-3xl mb-3"></i>
          <p>Belum ada data penerimaan</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Verifikasi -->
  <div id="modalVerif" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-gray-800 text-lg">Verifikasi Penerimaan</h3>
        <button onclick="closeModalVerif()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <input type="hidden" id="verifId"/>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Keputusan</label>
          <select id="fVerifStatus" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
            <option value="diverifikasi">Diverifikasi</option>
            <option value="ditolak">Ditolak</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Catatan</label>
          <textarea id="fVerifCatatan" rows="3"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none resize-none"></textarea>
        </div>
        <button onclick="submitVerif()"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-xl transition text-sm">
          Konfirmasi
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Lihat Foto -->
  <div id="modalFoto" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
    <div class="relative max-w-2xl w-full">
      <button onclick="document.getElementById('modalFoto').classList.add('hidden')"
        class="absolute -top-10 right-0 text-white hover:text-gray-300">
        <i class="fas fa-times text-xl"></i>
      </button>
      <img id="fotoImg" src="" alt="Bukti" class="w-full rounded-2xl shadow-2xl"/>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-4 right-4 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    requireAuth();
    document.getElementById('navbar').innerHTML = renderNavbar('penerimaan');
    const user = getUser();

    const loadPenerimaan = async () => {
      const status = document.getElementById('filterStatus').value;
      const params = status ? `?status_verifikasi=${status}` : '?';
      const res = await api.getPenerimaan(params);
      const tbody = document.getElementById('penerimaanBody');
      const empty = document.getElementById('penerimaanEmpty');

      if (res.success && res.data.length) {
        empty.classList.add('hidden');
        tbody.innerHTML = res.data.map(p => `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 font-medium text-gray-800">${p.kelompok_nama || '-'}</td>
            <td class="px-6 py-4"><span class="px-2.5 py-1 bg-green-50 text-green-700 rounded-lg text-xs font-medium">${p.jenis_pupuk || '-'}</span></td>
            <td class="px-6 py-4 text-right text-gray-600">${formatNumber(p.jumlah_dikirim)}</td>
            <td class="px-6 py-4 text-right font-semibold ${parseFloat(p.jumlah_diterima) < parseFloat(p.jumlah_dikirim) ? 'text-red-600' : 'text-green-600'}">${formatNumber(p.jumlah_diterima)}</td>
            <td class="px-6 py-4 text-gray-600">${formatDate(p.tanggal_terima)}</td>
            <td class="px-6 py-4 text-center">
              ${p.foto_url ? `<button onclick="lihatFoto('${p.foto_url}')" class="text-blue-500 hover:text-blue-700 text-xs"><i class="fas fa-image"></i> Lihat</button>` : '<span class="text-gray-300 text-xs">-</span>'}
            </td>
            <td class="px-6 py-4 text-center">
              <span class="px-2.5 py-1 rounded-full text-xs font-medium ${badgeStatus(p.status_verifikasi)}">${p.status_verifikasi}</span>
            </td>
            <td class="px-6 py-4 text-center">
              ${user.role === 'dinas' && p.status_verifikasi === 'pending' ? `
              <button onclick="openModalVerif(${p.id})"
                class="text-green-500 hover:text-green-700 text-xs px-3 py-1 rounded-lg hover:bg-green-50 transition">
                <i class="fas fa-check"></i> Verifikasi
              </button>` : '<span class="text-gray-300 text-xs">-</span>'}
            </td>
          </tr>`).join('');
      } else {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
      }
    };

    const openModalVerif = (id) => {
      document.getElementById('verifId').value = id;
      document.getElementById('modalVerif').classList.remove('hidden');
    };
    const closeModalVerif = () => document.getElementById('modalVerif').classList.add('hidden');

    const submitVerif = async () => {
      const id = document.getElementById('verifId').value;
      const status_verifikasi = document.getElementById('fVerifStatus').value;
      const catatan = document.getElementById('fVerifCatatan').value;
      const res = await api.verifikasiPenerimaan(id, { status_verifikasi, catatan });
      if (res.success) { showToast(res.message); closeModalVerif(); loadPenerimaan(); }
      else showToast(res.message, 'error');
    };

    const lihatFoto = (url) => {
      document.getElementById('fotoImg').src = url;
      document.getElementById('modalFoto').classList.remove('hidden');
    };

    loadPenerimaan();
  </script>
</body>
</html>
