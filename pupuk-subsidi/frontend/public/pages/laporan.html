<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laporan — SiPupuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 flex">
  <div id="navbar"></div>
  <main class="flex-1 p-8">
    <div class="max-w-7xl mx-auto">
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Laporan Distribusi</h1>
        <p class="text-gray-500 text-sm mt-1">Rekap distribusi pupuk subsidi per periode</p>
      </div>

      <!-- Filter -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-6 flex gap-4 flex-wrap items-end">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Bulan</label>
          <select id="filterBulan" class="border border-gray-200 rounded-xl px-3 py-2 text-sm">
            <option value="">Semua</option>
            <option value="1">Januari</option><option value="2">Februari</option>
            <option value="3">Maret</option><option value="4">April</option>
            <option value="5">Mei</option><option value="6">Juni</option>
            <option value="7">Juli</option><option value="8">Agustus</option>
            <option value="9">September</option><option value="10">Oktober</option>
            <option value="11">November</option><option value="12">Desember</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Tahun</label>
          <select id="filterTahun" class="border border-gray-200 rounded-xl px-3 py-2 text-sm">
            <option value="">Semua</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
        <button onclick="loadLaporan()"
          class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-green-700 transition">
          <i class="fas fa-search"></i> Tampilkan
        </button>
      </div>

      <!-- Summary Cards -->
      <div id="summaryCards" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6"></div>

      <!-- Detail Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
        <div class="px-6 py-4 border-b border-gray-100">
          <h2 class="font-semibold text-gray-800">Detail per Kelompok Tani</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Kelompok Tani</th>
                <th class="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Dialokasikan (kg)</th>
                <th class="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Diterima (kg)</th>
                <th class="text-center px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Status Verif</th>
              </tr>
            </thead>
            <tbody id="detailBody" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </div>

      <!-- Laporan Kelangkaan -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="font-semibold text-gray-800 mb-4">Laporan Kelangkaan Aktif</h2>
        <div id="kelangkaanList" class="space-y-3"></div>
      </div>
    </div>
  </main>

  <div id="modalFoto" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onclick="tutupFoto()">
    <div class="relative max-w-2xl w-full" onclick="event.stopPropagation()">
      <button onclick="tutupFoto()" class="absolute -top-10 right-0 text-white text-sm flex items-center gap-1"><i class="fas fa-times"></i> Tutup</button>
      <img id="fotoImg" src="" class="w-full rounded-2xl shadow-2xl object-contain max-h-screen"/>
    </div>
  </div>
  <div id="toast" class="hidden fixed bottom-4 right-4 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    requireAuth();
    document.getElementById('navbar').innerHTML = renderNavbar('laporan');

    const card = (icon, color, label, value, unit) => `
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 ${color} rounded-xl flex items-center justify-center">
            <i class="fas ${icon} text-white text-sm"></i>
          </div>
          <span class="text-xs text-gray-500 font-medium">${label}</span>
        </div>
        <p class="text-xl font-bold text-gray-800">${value}</p>
        <p class="text-xs text-gray-400 mt-0.5">${unit}</p>
      </div>`;

    const loadLaporan = async () => {
      const bulan = document.getElementById('filterBulan').value;
      const tahun = document.getElementById('filterTahun').value;
      let params = '?';
      if (bulan) params += `periode_bulan=${bulan}&`;
      if (tahun) params += `periode_tahun=${tahun}`;

      const res = await api.getLaporanDistribusi(params);
      if (!res.success) return showToast('Gagal memuat laporan', 'error');

      const d = res.data;
      document.getElementById('summaryCards').innerHTML =
        card('fa-box', 'bg-blue-500', 'Total Kuota', formatNumber(d.total_kuota_kg), 'kilogram') +
        card('fa-tasks', 'bg-purple-500', 'Total Dialokasikan', formatNumber(d.total_dialokasikan_kg), 'kilogram') +
        card('fa-shipping-fast', 'bg-yellow-500', 'Total Dikirim', formatNumber(d.total_dikirim_kg), 'kilogram') +
        card('fa-check-circle', 'bg-green-500', 'Total Diterima', formatNumber(d.total_diterima_kg), 'kilogram');

      const tbody = document.getElementById('detailBody');
      if (d.detail && d.detail.length) {
        tbody.innerHTML = d.detail.map(r => `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-3 font-medium text-gray-800">${r.kelompok_tani}</td>
            <td class="px-6 py-3 text-right text-gray-600">${formatNumber(r.dialokasikan_kg)}</td>
            <td class="px-6 py-3 text-right font-semibold ${parseFloat(r.diterima_kg) < parseFloat(r.dialokasikan_kg) ? 'text-red-600' : 'text-green-600'}">${formatNumber(r.diterima_kg)}</td>
            <td class="px-6 py-3 text-center">
              <span class="px-2.5 py-1 rounded-full text-xs font-medium ${badgeStatus(r.status_verif || 'pending')}">${r.status_verif || 'pending'}</span>
            </td>
          </tr>`).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-gray-400">Tidak ada data</td></tr>';
      }

      const kelRes = await api.getLaporanKelangkaan('?status=pending');
      const kelEl = document.getElementById('kelangkaanList');
      if (kelRes.success && kelRes.data.length) {
        kelEl.innerHTML = kelRes.data.map(k => `
          <div class="flex items-start gap-4 p-4 bg-red-50 rounded-xl border border-red-100">
            <div class="w-9 h-9 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <i class="fas fa-exclamation-triangle text-red-500 text-sm"></i>
            </div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-gray-800">${k.kelompok_nama} — ${k.jenis_pupuk}</p>
              <p class="text-xs text-gray-500 mt-1">${k.deskripsi}</p>
              <p class="text-xs text-gray-400 mt-1">${k.wilayah}</p>
              ${k.foto_url ? `<button onclick="lihatFoto('${k.foto_url}')" class="mt-2 flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-800 font-medium"><i class="fas fa-image"></i> Lihat Foto</button>` : ''}
            </div>
            <span class="px-2.5 py-1 bg-red-100 text-red-600 rounded-full text-xs font-medium">${k.status}</span>
          </div>`).join('');
      } else {
        kelEl.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Tidak ada laporan kelangkaan aktif</p>';
      }
    };

    const lihatFoto = (url) => {
      document.getElementById('fotoImg').src = url;
      document.getElementById('modalFoto').classList.remove('hidden');
    };
    const tutupFoto = () => {
      document.getElementById('modalFoto').classList.add('hidden');
      document.getElementById('fotoImg').src = '';
    };
    loadLaporan();
  </script>
</body>
</html>
